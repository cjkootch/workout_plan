<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Iron Protocol — Cole</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#f5f5f5">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect fill='%23f5f3ee' width='100' height='100' rx='20'/><text y='68' x='50' text-anchor='middle' font-size='50' fill='%238b6914' font-family='sans-serif' font-weight='bold'>IP</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    /* Light theme — semantic names */
    --bg: #f5f3ee; --surface: #ffffff; --card: #ffffff;
    --border: #e4e1d8; --border-strong: #c8c4b8;
    --text: #1a1a1a; --secondary: #555550; --muted: #99968e;
    --gold: #8b6914; --gold-bg: rgba(139,105,20,0.07); --gold-dim: #a07820;
    --gold-border: rgba(139,105,20,0.25);
    --red: #b83228; --red-bg: rgba(184,50,40,0.07); --orange: #b05820;
    --green: #276f37; --green-bg: rgba(39,111,55,0.09);
    --tab-h: 78px; --header-h: 118px;
  }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html, body { background:var(--bg); color:var(--text); font-family:'DM Mono',monospace; height:100%; overflow:hidden; }

  /* HEADER */
  .app-header { position:fixed; top:0; left:0; right:0; height:var(--header-h); background:var(--surface); border-bottom:1px solid var(--border); z-index:100; display:flex; flex-direction:column; justify-content:flex-end; padding:0 1rem 0.85rem; }
  .app-header::after { content:''; position:absolute; bottom:-1px; left:0; width:40%; height:2px; background:linear-gradient(90deg,var(--gold),transparent); }
  .header-top { display:flex; justify-content:space-between; align-items:center; margin-bottom:0.6rem; }
  .logo { font-family:'Bebas Neue',sans-serif; font-size:2rem; letter-spacing:0.08em; line-height:1; color:var(--text); }
  .logo span { color:var(--gold); }
  .header-badge { font-size:0.8rem; letter-spacing:0.07em; text-transform:uppercase; color:var(--secondary); text-align:right; line-height:1.8; }
  .header-badge strong { color:var(--gold); font-weight:500; }
  .stats-strip { display:flex; gap:0.5rem; overflow-x:auto; scrollbar-width:none; }
  .stats-strip::-webkit-scrollbar { display:none; }
  .stat-pill { flex-shrink:0; display:flex; align-items:center; gap:0.4rem; background:var(--bg); border:1px solid var(--border); border-radius:20px; padding:0.28rem 0.75rem; }
  .stat-pill-label { font-size:0.84rem; letter-spacing:0.08em; text-transform:uppercase; color:var(--muted); }
  .stat-pill-value { font-family:'Bebas Neue',sans-serif; font-size:1rem; color:var(--gold); letter-spacing:0.05em; }

  /* SESSION TIMER BAR */
  .session-bar { display:none; position:fixed; top:var(--header-h); left:0; right:0; height:52px; background:var(--surface); border-bottom:1px solid var(--border); z-index:99; padding:0 1rem; align-items:center; justify-content:space-between; }
  .session-bar.active { display:flex; }
  .session-timer-text { font-size:0.82rem; color:var(--gold); letter-spacing:0.06em; font-weight:500; }
  .session-btn { font-size:0.72rem; letter-spacing:0.06em; text-transform:uppercase; background:none; border:1.5px solid var(--border-strong); color:var(--secondary); border-radius:6px; padding:0 0.85rem; cursor:pointer; font-family:inherit; height:36px; white-space:nowrap; }
  .session-btn:active { background:var(--bg); }
  .session-btn.end { border-color:var(--red); color:var(--red); }

  /* REST TIMER OVERLAY */
  .rest-overlay { display:none; position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(245,243,238,0.97); z-index:200; flex-direction:column; align-items:center; justify-content:center; }
  .rest-overlay.active { display:flex; }
  .rest-label { font-size:0.8rem; letter-spacing:0.2em; text-transform:uppercase; color:var(--secondary); margin-bottom:0.5rem; }
  .rest-time { font-family:'Bebas Neue',sans-serif; font-size:6rem; color:var(--gold); line-height:1; }
  .rest-exercise { font-size:0.82rem; color:var(--secondary); margin-top:1rem; text-align:center; max-width:80%; line-height:1.6; }
  .rest-skip { margin-top:2rem; font-size:0.65rem; letter-spacing:0.1em; text-transform:uppercase; background:none; border:1.5px solid var(--border-strong); color:var(--secondary); border-radius:8px; padding:0.7rem 2rem; cursor:pointer; font-family:inherit; min-height:52px; }
  .rest-skip:active { background:var(--bg); }

  /* SCROLL AREA */
  .scroll-area { position:fixed; top:var(--header-h); bottom:var(--tab-h); left:0; right:0; overflow-y:auto; -webkit-overflow-scrolling:touch; overscroll-behavior:contain; }
  .scroll-area.with-timer { top:calc(var(--header-h) + 44px); }
  .page { display:none; padding:1rem 1.15rem 2rem; }
  .page.active { display:block; }

  /* DAY HERO */
  .day-hero { background:var(--surface); border:1px solid var(--border); border-radius:14px; padding:1.3rem 1.3rem 1.3rem 1.6rem; margin-bottom:1rem; position:relative; overflow:hidden; box-shadow:0 1px 4px rgba(0,0,0,0.06); }
  .day-hero::before { content:''; position:absolute; top:0; left:0; width:4px; height:100%; background:var(--gold); }
  .day-hero-tag { font-size:0.84rem; letter-spacing:0.15em; text-transform:uppercase; color:var(--gold); margin-bottom:0.35rem; font-weight:500; }
  .day-hero-title { font-family:'Bebas Neue',sans-serif; font-size:2.5rem; letter-spacing:0.05em; line-height:1; margin-bottom:0.45rem; }
  .day-hero-sub { font-size:0.82rem; color:var(--secondary); letter-spacing:0.02em; line-height:1.7; }

  /* BLOCK LABEL */
  .block-label { font-size:0.82rem; letter-spacing:0.16em; text-transform:uppercase; color:var(--gold); padding:0.8rem 0 0.55rem; display:flex; align-items:center; gap:0.75rem; margin-bottom:0.4rem; font-weight:500; }
  .block-label::after { content:''; flex:1; height:1px; background:var(--border); }

  /* EXERCISE CARD */
  .ex-card { background:var(--card); border:1px solid var(--border); border-radius:12px; margin-bottom:0.75rem; overflow:hidden; transition:border-color 0.2s, box-shadow 0.2s; box-shadow:0 1px 4px rgba(0,0,0,0.06); }
  .ex-card.all-done { border-color:var(--green); box-shadow:0 1px 5px rgba(39,111,55,0.15); }
  .ex-card-top { padding:1.1rem 1rem 0.9rem; display:flex; justify-content:space-between; align-items:flex-start; gap:0.75rem; cursor:pointer; }
  .ex-left { flex:1; }
  .ex-name { font-size:1.05rem; font-weight:500; letter-spacing:0.01em; line-height:1.3; margin-bottom:0.3rem; color:var(--text); }
  .ex-note { font-size:0.82rem; color:var(--secondary); font-style:italic; line-height:1.7; }
  .ex-last-session { font-size:0.84rem; color:var(--gold); margin-top:0.35rem; font-weight:500; }
  .ex-badges { display:flex; flex-direction:column; align-items:flex-end; gap:0.3rem; flex-shrink:0; }
  .ex-badge { font-size:0.84rem; letter-spacing:0.04em; padding:0.26rem 0.6rem; border-radius:6px; white-space:nowrap; }
  .ex-badge.sets { background:var(--gold-bg); color:var(--gold); border:1px solid var(--gold-border); }
  .ex-badge.reps { background:var(--bg); color:var(--secondary); border:1px solid var(--border); }
  .ex-meta-strip { background:var(--bg); border-top:1px solid var(--border); padding:0.6rem 1rem; display:flex; gap:1.75rem; }
  .ex-meta-label { font-size:0.82rem; letter-spacing:0.13em; text-transform:uppercase; color:var(--muted); margin-bottom:0.15rem; }
  .ex-meta-value { font-size:0.82rem; color:var(--secondary); }
  .ss-badge { display:inline-block; font-size:0.82rem; letter-spacing:0.07em; background:var(--gold-bg); color:var(--gold); padding:0.12rem 0.35rem; border-radius:3px; text-transform:uppercase; margin-left:0.35rem; vertical-align:middle; border:1px solid var(--gold-border); }

  /* SET LOGGING */
  .set-log-area { padding:0; max-height:0; overflow:hidden; border-top:1px solid transparent; transition:max-height 0.3s ease, padding 0.3s ease, border-color 0.2s; }
  .ex-card.expanded .set-log-area { padding:0.65rem 1rem 0.9rem; max-height:600px; border-top-color:var(--border); }
  .ex-expand-hint { font-size:0.66rem; color:var(--muted); letter-spacing:0.08em; text-transform:uppercase; margin-top:0.25rem; transition:opacity 0.2s; }
  .ex-card.expanded .ex-expand-hint { opacity:0; }
  .set-row { display:flex; align-items:center; gap:0.65rem; padding:0.6rem 0; border-bottom:1px solid var(--border); }
  .set-row:last-child { border-bottom:none; }
  .set-num { font-size:0.82rem; letter-spacing:0.08em; text-transform:uppercase; color:var(--muted); width:2.75rem; flex-shrink:0; line-height:1.3; }
  .set-prev { display:block; font-size:0.6rem; color:var(--gold); font-style:italic; letter-spacing:0; text-transform:none; margin-top:0.2rem; white-space:nowrap; }
  .set-input { background:var(--bg); border:1.5px solid var(--border-strong); border-radius:8px; color:var(--text); font-family:inherit; font-size:1rem; padding:0.5rem 0.4rem; width:4.5rem; text-align:center; min-height:52px; }
  .set-input:focus { outline:none; border-color:var(--gold); box-shadow:0 0 0 3px var(--gold-bg); }
  .set-input::placeholder { color:var(--muted); font-size:0.8rem; }
  .set-x { font-size:0.85rem; color:var(--muted); }
  .set-check { width:44px; height:44px; border-radius:50%; border:2px solid var(--border-strong); background:none; cursor:pointer; display:flex; align-items:center; justify-content:center; flex-shrink:0; transition:all 0.15s; font-size:1rem; color:transparent; }
  .set-check.done { background:var(--green); border-color:var(--green); color:#fff; }

  /* CARDIO CARD */
  .cardio-card { background:var(--card); border:1px solid var(--border); border-left:3px solid var(--gold); border-radius:12px; padding:1.1rem; margin-bottom:0.75rem; box-shadow:0 1px 4px rgba(0,0,0,0.06); }
  .cardio-title { font-family:'Bebas Neue',sans-serif; font-size:1.2rem; letter-spacing:0.06em; color:var(--gold); margin-bottom:0.45rem; }
  .cardio-detail { font-size:0.82rem; color:var(--secondary); line-height:1.8; }
  .achilles-note { margin-top:0.65rem; padding-top:0.65rem; border-top:1px solid var(--border); font-size:0.88rem; color:var(--orange); line-height:1.7; }

  /* WARNING */
  .warning-card { background:var(--red-bg); border:1px solid rgba(184,50,40,0.2); border-left:3px solid var(--red); border-radius:12px; padding:1rem 1.1rem; margin-bottom:1rem; font-size:0.82rem; color:#8b1c14; line-height:1.8; }
  .warning-card strong { color:#6e1408; }

  /* PRINCIPLES */
  .principle-card { background:var(--card); border:1px solid var(--border); border-radius:12px; margin-bottom:0.75rem; overflow:hidden; box-shadow:0 1px 4px rgba(0,0,0,0.06); }
  .principle-card-header { padding:1rem 1.1rem; border-bottom:1px solid transparent; display:flex; justify-content:space-between; align-items:center; cursor:pointer; user-select:none; min-height:56px; }
  .principle-card.open .principle-card-header { border-bottom-color:var(--border); }
  .principle-card-title { font-family:'Bebas Neue',sans-serif; font-size:1.1rem; letter-spacing:0.06em; color:var(--gold); }
  .principle-chevron { font-size:0.82rem; color:var(--muted); transition:transform 0.2s; }
  .principle-card.open .principle-chevron { transform:rotate(180deg); }
  .principle-body { display:none; padding:1rem 1.1rem; }
  .principle-card.open .principle-body { display:block; }
  .principle-body p { font-size:0.82rem; color:var(--secondary); line-height:1.85; margin-bottom:0.75rem; }
  .principle-list { list-style:none; }
  .principle-list li { font-size:0.8rem; color:var(--secondary); padding:0.55rem 0; border-bottom:1px solid var(--border); display:flex; gap:0.6rem; line-height:1.6; }
  .principle-list li:last-child { border-bottom:none; }
  .principle-list li::before { content:'—'; color:var(--gold); flex-shrink:0; }

  /* DATA TABLE */
  .data-table { width:100%; background:var(--card); border:1px solid var(--border); border-radius:12px; overflow:hidden; margin-bottom:1rem; font-size:0.8rem; border-collapse:collapse; box-shadow:0 1px 4px rgba(0,0,0,0.06); }
  .data-table thead { background:var(--bg); }
  .data-table th { padding:0.65rem 0.9rem; text-align:left; font-size:0.84rem; letter-spacing:0.12em; text-transform:uppercase; color:var(--muted); font-weight:500; }
  .data-table td { padding:0.72rem 0.9rem; border-top:1px solid var(--border); color:var(--secondary); line-height:1.7; }
  .data-table td:first-child { color:var(--text); }
  .gold { color:var(--gold); font-weight:500; }

  /* BODYWEIGHT LOG */
  .bw-log-section { margin-bottom:1rem; }
  .bw-input-row { display:flex; gap:0.6rem; margin-bottom:0.85rem; }
  .bw-input { flex:1; background:var(--bg); border:1.5px solid var(--border-strong); border-radius:8px; color:var(--text); font-family:inherit; font-size:1rem; padding:0.65rem 0.85rem; min-height:52px; }
  .bw-input:focus { outline:none; border-color:var(--gold); box-shadow:0 0 0 3px var(--gold-bg); }
  .bw-btn { background:var(--gold-bg); border:1px solid var(--gold-border); color:var(--gold); font-family:inherit; font-size:0.84rem; letter-spacing:0.09em; text-transform:uppercase; border-radius:8px; padding:0.65rem 1.25rem; cursor:pointer; font-weight:500; min-height:52px; }
  .bw-btn:active { background:rgba(139,105,20,0.14); }
  .bw-chart { width:100%; height:130px; background:var(--bg); border:1px solid var(--border); border-radius:10px; overflow:hidden; position:relative; }
  .bw-chart canvas { width:100%; height:100%; }
  .bw-entries { margin-top:0.6rem; max-height:130px; overflow-y:auto; }
  .bw-entry { display:flex; justify-content:space-between; padding:0.45rem 0; border-bottom:1px solid var(--border); font-size:0.88rem; }
  .bw-entry-date { color:var(--secondary); }
  .bw-entry-weight { color:var(--gold); font-weight:500; }

  /* WEEKLY SUMMARY */
  .weekly-summary { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:1rem 1.1rem; margin-bottom:1rem; box-shadow:0 1px 4px rgba(0,0,0,0.06); }
  .weekly-summary-title { font-family:'Bebas Neue',sans-serif; font-size:1.15rem; letter-spacing:0.06em; color:var(--gold); margin-bottom:0.6rem; }
  .weekly-stats { display:flex; gap:0.5rem; }
  .weekly-stat { flex:1; text-align:center; background:var(--bg); border-radius:8px; padding:0.65rem 0.25rem; }
  .weekly-stat-value { font-family:'Bebas Neue',sans-serif; font-size:1.5rem; color:var(--gold); }
  .weekly-stat-label { font-size:0.8rem; letter-spacing:0.1em; text-transform:uppercase; color:var(--muted); margin-top:0.1rem; }

  /* TAB BAR */
  .tab-bar { position:fixed; bottom:0; left:0; right:0; height:var(--tab-h); background:var(--surface); border-top:1px solid var(--border); display:flex; z-index:100; padding-bottom:env(safe-area-inset-bottom); }
  .tab { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:0.2rem; background:none; border:none; cursor:pointer; padding:0.5rem 0.1rem; position:relative; }
  .tab::after { content:''; position:absolute; top:0; left:15%; right:15%; height:2px; background:var(--gold); border-radius:0 0 2px 2px; opacity:0; transition:opacity 0.15s; }
  .tab.active::after { opacity:1; }
  .tab-num { font-family:'Bebas Neue',sans-serif; font-size:1.4rem; line-height:1; color:var(--muted); transition:color 0.15s; }
  .tab.active .tab-num { color:var(--gold); }
  .tab-label { font-size:0.58rem; letter-spacing:0.09em; text-transform:uppercase; color:var(--muted); transition:color 0.15s; line-height:1; }
  .tab.active .tab-label { color:var(--gold); }
  .tab-icon { font-size:0.8rem; letter-spacing:0.05em; text-transform:uppercase; color:var(--muted); transition:color 0.15s; }
  .tab.active .tab-icon { color:var(--gold); }

  /* STATS PAGE */
  .stats-overview { display:grid; grid-template-columns:1fr 1fr; gap:0.75rem; margin-bottom:1rem; }
  .stat-big-card { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:1.05rem 1rem; text-align:center; box-shadow:0 1px 4px rgba(0,0,0,0.06); }
  .stat-big-card.gold-border { border-color:var(--gold-border); background:var(--gold-bg); }
  .stat-big-value { font-family:'Bebas Neue',sans-serif; font-size:2.1rem; color:var(--gold); letter-spacing:0.04em; line-height:1; }
  .stat-big-label { font-size:0.82rem; letter-spacing:0.12em; text-transform:uppercase; color:var(--secondary); margin-top:0.35rem; }
  .stats-chart-card { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:1rem 1rem 1.1rem; margin-bottom:1rem; box-shadow:0 1px 4px rgba(0,0,0,0.06); }
  .stats-chart-title { font-size:0.66rem; letter-spacing:0.13em; text-transform:uppercase; color:var(--secondary); margin-bottom:0.85rem; font-weight:500; }
  .stats-canvas { width:100%; height:140px; display:block; }
  .stats-canvas.tall { height:175px; }
  .pr-list { list-style:none; }
  .pr-item { display:flex; justify-content:space-between; align-items:center; padding:0.72rem 0; border-bottom:1px solid var(--border); gap:0.75rem; }
  .pr-item:last-child { border-bottom:none; }
  .pr-name { font-size:0.82rem; color:var(--text); flex:1; line-height:1.35; }
  .pr-right { text-align:right; flex-shrink:0; }
  .pr-value { font-size:0.88rem; color:var(--gold); font-weight:500; white-space:nowrap; }
  .pr-date { font-size:0.84rem; color:var(--muted); margin-top:0.15rem; }
  .session-list { list-style:none; }
  .session-item { display:flex; justify-content:space-between; align-items:center; padding:0.65rem 0; border-bottom:1px solid var(--border); }
  .session-item:last-child { border-bottom:none; }
  .session-date { font-size:0.84rem; color:var(--text); }
  .session-day-tag { font-size:0.82rem; color:var(--muted); letter-spacing:0.06em; margin-top:0.1rem; }
  .session-right { text-align:right; }
  .session-sets { font-size:0.82rem; color:var(--gold); font-weight:500; }
  .session-dur { font-size:0.84rem; color:var(--muted); margin-top:0.1rem; }
  .stats-loading { padding:3rem 1rem; text-align:center; font-size:0.88rem; letter-spacing:0.1em; text-transform:uppercase; color:var(--muted); }
  .stats-empty { text-align:center; font-size:0.88rem; color:var(--muted); padding:1.5rem 0; }

  /* COMPLETE WORKOUT BUTTON */
  .complete-btn-wrap { padding:1rem 0 0.5rem; }
  .complete-btn { width:100%; background:var(--green-bg); border:1.5px solid var(--green); color:var(--green); font-family:'DM Mono',monospace; font-size:0.84rem; letter-spacing:0.1em; text-transform:uppercase; border-radius:10px; padding:0.95rem 1rem; cursor:pointer; transition:background 0.15s; min-height:56px; font-weight:500; }
  .complete-btn:active { background:rgba(39,111,55,0.16); }
  .complete-btn.done { opacity:0.55; cursor:default; }

  /* VIDEO MODAL */
  .video-modal { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.82); z-index:300; align-items:center; justify-content:center; padding:1rem; }
  .video-modal.active { display:flex; }
  .video-modal-inner { width:100%; max-width:480px; background:#000; border-radius:12px; overflow:hidden; position:relative; }
  .video-modal-close { position:absolute; top:0.5rem; right:0.6rem; background:rgba(0,0,0,0.6); border:none; color:#fff; font-size:1.2rem; width:36px; height:36px; border-radius:50%; cursor:pointer; z-index:10; display:flex; align-items:center; justify-content:center; line-height:1; }
  .video-modal-title { font-size:0.7rem; letter-spacing:0.08em; text-transform:uppercase; color:rgba(255,255,255,0.6); padding:0.6rem 0.75rem 0.4rem; }
  .video-modal iframe { width:100%; aspect-ratio:16/9; display:block; border:none; }
  .ex-video-btn { background:none; border:none; cursor:pointer; padding:0 0 0 0.4rem; color:var(--gold); font-size:0.7rem; vertical-align:middle; opacity:0.75; flex-shrink:0; }
  .ex-video-btn:active { opacity:1; }

  /* PHASE SELECTOR */
  .phase-selector { display:flex; gap:0; background:var(--bg); border:1.5px solid var(--border-strong); border-radius:10px; overflow:hidden; margin-bottom:1rem; }
  .phase-btn { flex:1; background:none; border:none; font-family:inherit; font-size:0.72rem; letter-spacing:0.1em; text-transform:uppercase; color:var(--muted); padding:0.65rem 0.25rem; cursor:pointer; transition:all 0.15s; }
  .phase-btn.active { background:var(--gold); color:#fff; font-weight:500; }
  .phase-btn:not(.active):active { background:var(--gold-bg); }

  /* INSIGHT CARD */
  .insight-card { background:var(--surface); border:1px solid var(--gold-border); border-radius:12px; padding:1rem 1.1rem; margin-bottom:1rem; box-shadow:0 1px 4px rgba(0,0,0,0.06); }
  .insight-header { display:flex; align-items:center; gap:0.5rem; margin-bottom:0.6rem; }
  .insight-icon { font-size:0.9rem; }

// ===== STORAGE =====
const DB_KEY = 'ironprotocol_v2';
// memDB is the live in-memory store; localStorage is the offline cache.
let memDB = null;
function loadDB() {
  if (memDB !== null) return memDB;
  try { memDB = JSON.parse(localStorage.getItem(DB_KEY)) || {}; }
  catch(e) { memDB = {}; }
  return memDB;
}
function saveDB(db) {
  memDB = db;
  try { localStorage.setItem(DB_KEY, JSON.stringify(db)); } catch(e) {}
}
function todayKey() { return new Date().toISOString().slice(0,10); }
function weekStart() { const d = new Date(); d.setDate(d.getDate() - d.getDay()); return d.toISOString().slice(0,10); }

function getSessionData(day, exName) {
  const db = loadDB();
  const key = todayKey();
  return (db.sessions && db.sessions[key] && db.sessions[key][day] && db.sessions[key][day][exName]) || null;
}
function saveSetData(day, exName, setIdx, weight, reps, done) {
  const db = loadDB();
  const key = todayKey();
  if (!db.sessions) db.sessions = {};
  if (!db.sessions[key]) db.sessions[key] = {};
  if (!db.sessions[key][day]) db.sessions[key][day] = {};
  if (!db.sessions[key][day][exName]) db.sessions[key][day][exName] = [];
  db.sessions[key][day][exName][setIdx] = { weight, reps, done };
  saveDB(db);
  // Persist to Neon in background
  fetch('/api/sets', {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ date: key, day, exercise: exName, setIdx, weight, reps, done })
  }).catch(() => {});
}

function getLastSession(day, exName) {
  const db = loadDB();
  if (!db.sessions) return null;
  const today = todayKey();
  const dates = Object.keys(db.sessions).filter(d => d < today && db.sessions[d][day] && db.sessions[d][day][exName]).sort().reverse();
  return dates.length ? { date: dates[0], sets: db.sessions[dates[0]][day][exName] } : null;
}

function getWeeklyStats() {
  const db = loadDB();
  if (!db.sessions) return { sets: 0, reps: 0, tonnage: 0, sessions: 0 };
  const ws = weekStart();
  let sets = 0, reps = 0, tonnage = 0, sessionDays = new Set();
  Object.entries(db.sessions).forEach(([date, days]) => {
    if (date >= ws) {
      Object.entries(days).forEach(([day, exercises]) => {
        let hasWork = false;
        Object.values(exercises).forEach(setArr => {
          setArr.forEach(s => {
            if (s && s.done) {
              sets++;
              const r = parseInt(s.reps) || 0;
              const w = parseFloat(s.weight) || 0;
              reps += r;
              tonnage += r * w;
              hasWork = true;
            }
          });
        });
        if (hasWork) sessionDays.add(date);
      });
    }
  });
  return { sets, reps, tonnage: Math.round(tonnage), sessions: sessionDays.size };
}

// ===== BODYWEIGHT =====
function saveBW(weight) {
  const db = loadDB();
  if (!db.bodyweight) db.bodyweight = [];
  const entry = { date: todayKey(), weight: parseFloat(weight) };
  db.bodyweight.push(entry);
  saveDB(db);
  // Persist to Neon in background
  fetch('/api/bodyweight', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ weight: entry.weight, date: entry.date })
  }).catch(() => {});
}
function getBWData() { const db = loadDB(); return (db.bodyweight || []).slice(-30); }

// ===== SESSION TIMER =====
let sessionStart = null, sessionInterval = null, sessionActive = false;
function toggleSession() {
  if (!sessionActive) {
    sessionActive = true; sessionStart = Date.now();
    document.getElementById('sessionBar').classList.add('active');
    document.getElementById('scrollArea').classList.add('with-timer');
    document.getElementById('sessionToggle').textContent = 'Pause';
    sessionInterval = setInterval(updateSessionTimer, 1000);
  } else {
    sessionActive = false;
    document.getElementById('sessionToggle').textContent = 'Resume';
    clearInterval(sessionInterval);
  }
}
function endSession() {
  const elapsed = sessionStart ? Math.floor((Date.now() - sessionStart)/1000) : 0;
  sessionActive = false; sessionStart = null;
  clearInterval(sessionInterval);
  document.getElementById('sessionBar').classList.remove('active');
  document.getElementById('scrollArea').classList.remove('with-timer');
  document.getElementById('sessionTimerText').textContent = 'SESSION 00:00';
  document.getElementById('sessionToggle').textContent = 'Start';
  // Save session duration locally + persist to Neon
  const db = loadDB();
  if (!db.sessionTimes) db.sessionTimes = [];
  const sessionDate = todayKey();
  db.sessionTimes.push({ date: sessionDate, duration: elapsed });
  saveDB(db);
  fetch('/api/sessions', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ duration: elapsed, date: sessionDate })
  }).catch(() => {});
  updateWeeklySummary();
}
function updateSessionTimer() {
  if (!sessionStart) return;
  const s = Math.floor((Date.now() - sessionStart)/1000);
  const m = Math.floor(s/60), sec = s%60;
  document.getElementById('sessionTimerText').textContent = `SESSION ${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
}

let restInterval = null, restRemaining = 0;
function startRest(seconds, exName) {
  if (seconds <= 0) return;
  restRemaining = seconds;
  document.getElementById('restExName').textContent = 'Next: ' + exName;
  document.getElementById('restOverlay').classList.add('active');
  updateRestDisplay();
  restInterval = setInterval(() => {
    restRemaining--;
    if (restRemaining <= 0) { skipRest(); return; }
    updateRestDisplay();
  }, 1000);
}
function updateRestDisplay() {
  const m = Math.floor(restRemaining/60), s = restRemaining%60;
  document.getElementById('restTime').textContent = m > 0 ? `${m}:${String(s).padStart(2,'0')}` : `0:${String(s).padStart(2,'0')}`;
}
function skipRest() {
  clearInterval(restInterval);
  document.getElementById('restOverlay').classList.remove('active');
  // vibrate if available
  if (navigator.vibrate) navigator.vibrate(200);
}

function completeSet(day, exName, idx, btn, restSec) {

  const wInput = row.querySelector('[data-field="weight"]');
  const rInput = row.querySelector('[data-field="reps"]');
  const wasDone = btn.classList.contains('done');
  const nowDone = !wasDone;
  btn.classList.toggle('done');
  saveSetData(day, exName, idx, wInput.value, rInput.value, nowDone);

  // Auto-start session on first set completion
  if (nowDone && !sessionStart) { toggleSession(); }

  // Check if card is all done
  const card = btn.closest('.ex-card');
  const allChecks = card.querySelectorAll('.set-check');
  const allDone = Array.from(allChecks).every(c => c.classList.contains('done'));
  card.classList.toggle('all-done', allDone);

  // Start rest timer
  if (nowDone && restSec > 0) { startRest(restSec, exName); }

  updateWeeklySummary();
}

function renderBWChart() {
  const canvas = document.getElementById('bwChart');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const data = getBWData();
  const w = canvas.offsetWidth, h = canvas.offsetHeight;
  canvas.width = w * 2; canvas.height = h * 2;
  ctx.scale(2, 2);
  ctx.clearRect(0, 0, w, h);
  if (data.length < 2) {
    ctx.fillStyle = '#99968e'; ctx.font = '11px DM Mono'; ctx.textAlign = 'center';
    ctx.fillText(data.length === 0 ? 'Log your weight to see trends' : 'Need 2+ entries for chart', w/2, h/2);
    return;
  }
  const weights = data.map(d => d.weight);
  const min = Math.min(...weights) - 2, max = Math.max(...weights) + 2;
  const pad = { t: 15, b: 20, l: 40, r: 10 };
  const cw = w - pad.l - pad.r, ch = h - pad.t - pad.b;

  // Grid
  ctx.strokeStyle = '#e4e1d8'; ctx.lineWidth = 0.5;
  for (let i = 0; i <= 4; i++) {
    const y = pad.t + (ch / 4) * i;
    ctx.beginPath(); ctx.moveTo(pad.l, y); ctx.lineTo(w - pad.r, y); ctx.stroke();
    ctx.fillStyle = '#99968e'; ctx.font = '9px DM Mono'; ctx.textAlign = 'right';
    ctx.fillText(Math.round(max - (max - min) * i / 4), pad.l - 5, y + 3);
  }

  // Line
  ctx.strokeStyle = '#8b6914'; ctx.lineWidth = 2; ctx.beginPath();
  data.forEach((d, i) => {
    const x = pad.l + (cw / (data.length - 1)) * i;
    const y = pad.t + ch - ((d.weight - min) / (max - min)) * ch;
    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  });
  ctx.stroke();

  // Dots
  data.forEach((d, i) => {
    const x = pad.l + (cw / (data.length - 1)) * i;
    const y = pad.t + ch - ((d.weight - min) / (max - min)) * ch;
    ctx.beginPath(); ctx.arc(x, y, 3, 0, Math.PI * 2);
    ctx.fillStyle = '#8b6914'; ctx.fill();
  });
}

// ===== COMPLETE WORKOUT =====
async function completeWorkout(dayId, btn) {
  if (btn.disabled) return;
  btn.disabled = true;
  btn.textContent = 'Saving...';

  const today = todayKey();
  const db = loadDB();
  const dayData = (db.sessions && db.sessions[today] && db.sessions[today][dayId]) || {};

  const sets = [];
  Object.entries(dayData).forEach(([exercise, setArr]) => {
    (setArr || []).forEach((s, idx) => {
      if (s) sets.push({ exercise, setIdx: idx, weight: s.weight || null, reps: s.reps || null, done: !!s.done });
    });
  });

  const duration = sessionStart ? Math.floor((Date.now() - sessionStart) / 1000) : 0;

  try {
    const res = await fetch('/api/complete', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ date: today, day: dayId, sets, duration })
    });
    if (!res.ok) throw new Error('API ' + res.status);

    if (sessionStart) endSession();

    const db2 = loadDB();
    if (!db2.completedWorkouts) db2.completedWorkouts = {};
    db2.completedWorkouts[`${today}_${dayId}`] = true;
    saveDB(db2);

    btn.textContent = '✓ Workout Logged';
    btn.classList.add('done');
  } catch(e) {
    btn.disabled = false;
    btn.textContent = 'Retry — Complete Workout';
    console.warn('completeWorkout failed:', e);
  }
}

function scheduleAutoComplete() {
  const now = new Date();
  const midnight = new Date(now);
  midnight.setHours(24, 0, 0, 0);
  setTimeout(async () => {
    await autoCompleteAll();
    scheduleAutoComplete(); // reschedule for the next midnight
  }, midnight - now);
}

async function autoCompleteAll() {
  const today = todayKey();
  const db = loadDB();
  if (!db.sessions || !db.sessions[today]) return;

  for (const dayId of Object.keys(DAYS)) {
    const key = `${today}_${dayId}`;
    if (db.completedWorkouts && db.completedWorkouts[key]) continue;

    const dayData = db.sessions[today][dayId];
    if (!dayData) continue;

    const hasDone = Object.values(dayData).some(arr => (arr || []).some(s => s && s.done));
    if (!hasDone) continue;

    const sets = [];
    Object.entries(dayData).forEach(([exercise, setArr]) => {
      (setArr || []).forEach((s, idx) => {
        if (s) sets.push({ exercise, setIdx: idx, weight: s.weight || null, reps: s.reps || null, done: !!s.done });
      });
    });

    try {
      await fetch('/api/complete', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ date: today, day: dayId, sets, duration: 0 })
      });
      const db2 = loadDB();
      if (!db2.completedWorkouts) db2.completedWorkouts = {};
      db2.completedWorkouts[key] = true;
      saveDB(db2);
    } catch(e) {
      console.warn('Auto-complete failed for', dayId, e);
    }
  }
  if (sessionStart) endSession();
}

async function renderStats() {

  page.innerHTML = '<div class="stats-loading">Loading Stats...</div>';

  try {
    const res = await fetch('/api/stats');
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const d = await res.json();

    const ov = d.overview || {};
    const streak = d.streak || { current: 0, best: 0 };
    const totalTonnage = parseInt(ov.total_tonnage) || 0;
    const tonnageDisplay = totalTonnage >= 1000
      ? (totalTonnage / 1000).toFixed(1) + 'K'
      : totalTonnage.toString();

    const currentPhase = window._phase || 'bulk';
    let html = `
      <div class="day-hero">
        <div class="day-hero-tag">Iron Protocol</div>
        <div class="day-hero-title">STATS</div>
        <div class="day-hero-sub">Progress · Volume · PRs · Bodyweight</div>
      </div>

      <div class="phase-selector">
        <button class="phase-btn${currentPhase==='cut'?' active':''}" onclick="setPhase('cut',this)">Cut</button>
        <button class="phase-btn${currentPhase==='maintain'?' active':''}" onclick="setPhase('maintain',this)">Maintain</button>
        <button class="phase-btn${currentPhase==='bulk'?' active':''}" onclick="setPhase('bulk',this)">Bulk</button>
      </div>

      <div class="insight-card" id="insightCard">
        <div class="insight-header"><span class="insight-icon">🤖</span><span class="insight-title">Coach Insight</span></div>
        <div class="insight-body insight-loading" id="insightBody">Analyzing your data…</div>
      </div>

      <div class="stats-overview">
        <div class="stat-big-card">
          <div class="stat-big-value">${parseInt(ov.total_days) || 0}</div>
          <div class="stat-big-label">Sessions</div>
        </div>
        <div class="stat-big-card">
          <div class="stat-big-value">${(parseInt(ov.total_sets) || 0).toLocaleString()}</div>
          <div class="stat-big-label">Sets Done</div>
        </div>
        <div class="stat-big-card">
          <div class="stat-big-value">${tonnageDisplay}</div>
          <div class="stat-big-label">Total Tonnage (lbs)</div>
        </div>
        <div class="stat-big-card gold-border">
          <div class="stat-big-value">${streak.current}</div>
          <div class="stat-big-label">Day Streak${streak.best > 1 ? ' · Best ' + streak.best : ''}</div>
        </div>
      </div>
    `;

    // Weekly volume chart
    html += `
      <div class="stats-chart-card">
        <div class="stats-chart-title">Weekly Tonnage — Last 8 Weeks</div>
        <canvas id="statsVolCanvas" class="stats-canvas"></canvas>
      </div>
    `;

    // PRs
    if (d.prs && d.prs.length > 0) {
      const KEY_ORDER = [
        'Barbell Flat Bench Press','Barbell Bent-Over Row','Back Squat','Romanian Deadlift',
        'Barbell Curl','Seated DB Overhead Press','Lat Pulldown (Wide Overhand)','Deadlift'
      ];
      const sorted = [...d.prs].sort((a, b) => {
        const ai = KEY_ORDER.indexOf(a.exercise_name), bi = KEY_ORDER.indexOf(b.exercise_name);
        if (ai === -1 && bi === -1) return a.exercise_name.localeCompare(b.exercise_name);
        if (ai === -1) return 1; if (bi === -1) return -1;
        return ai - bi;
      });
      html += `<div class="block-label">Personal Records</div>
        <div class="stats-chart-card" style="padding:0.75rem 1rem">
          <ul class="pr-list">`;
      sorted.forEach(pr => {
        const repsNum = parseInt(pr.reps);
        const repsStr = !isNaN(repsNum) ? `× ${repsNum} reps` : '';
        html += `<li class="pr-item">
          <div class="pr-name">${pr.exercise_name}</div>
          <div class="pr-right">
            <div class="pr-value">${parseFloat(pr.weight)} lbs ${repsStr}</div>
            <div class="pr-date">${pr.date}</div>
          </div>
        </li>`;
      });
      html += `</ul></div>`;
    }

    // Bodyweight chart
    if (d.bodyweight && d.bodyweight.length > 1) {
      html += `
        <div class="stats-chart-card">
          <div class="stats-chart-title">Bodyweight Trend (lbs)</div>
          <canvas id="statsBWCanvas" class="stats-canvas tall"></canvas>
        </div>
      `;
    }

    // Recent sessions
    if (d.recentSessions && d.recentSessions.length > 0) {
      html += `<div class="block-label">Recent Sessions</div>
        <div class="stats-chart-card" style="padding:0.75rem 1rem">
          <ul class="session-list">`;
      d.recentSessions.forEach(s => {
        const mins = parseInt(s.duration_seconds) > 0 ? Math.round(s.duration_seconds / 60) + ' min' : null;
        const t = parseInt(s.tonnage) || 0;
        html += `<li class="session-item">
          <div class="session-date">${s.date}</div>
          <div class="session-right">
            <div class="session-sets">${s.sets} sets · ${t.toLocaleString()} lbs</div>
            ${mins ? `<div class="session-dur">${mins}</div>` : ''}
          </div>
        </li>`;
      });
      html += `</ul></div>`;
    }

    html += '<div style="height:1rem"></div>';
    page.innerHTML = html;

    // Draw charts after DOM is painted
    requestAnimationFrame(() => {
      if (d.weeklyVolume) drawVolumeBarChart('statsVolCanvas', d.weeklyVolume);
      if (d.bodyweight && d.bodyweight.length > 1) drawStatsBWChart('statsBWCanvas', d.bodyweight);
    });

    // Load AI insight (resets cache on each stats open so it stays fresh)
    _insightCache = null;
    loadInsight();

  } catch(e) {
    page.innerHTML = `<div class="stats-loading">Failed to load stats.<br><span style="color:var(--red);font-size:0.5rem">${e.message}</span></div>`;
    console.error('renderStats:', e);
  }
}

function drawVolumeBarChart(canvasId, weeklyData) {
  const canvas = document.getElementById(canvasId);
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const W = canvas.offsetWidth, H = canvas.offsetHeight;
  canvas.width = W * 2; canvas.height = H * 2;
  ctx.scale(2, 2);

  if (!weeklyData || weeklyData.length === 0) {
    ctx.fillStyle = '#99968e'; ctx.font = '11px DM Mono'; ctx.textAlign = 'center';
    ctx.fillText('No data yet — complete some workouts!', W / 2, H / 2);
    return;
  }

  const values = weeklyData.map(d => parseInt(d.tonnage) || 0);
  const maxVal = Math.max(...values, 1);
  const pad = { t: 12, b: 28, l: 8, r: 8 };
  const cw = W - pad.l - pad.r, ch = H - pad.t - pad.b;
  const n = weeklyData.length;
  const slotW = cw / n;
  const barW = slotW * 0.6;
  const gapL = slotW * 0.2;

  weeklyData.forEach((d, i) => {
    const x = pad.l + slotW * i + gapL;
    const barH = Math.max((values[i] / maxVal) * ch, values[i] > 0 ? 2 : 0);
    const y = pad.t + ch - barH;

    // Track background
    ctx.fillStyle = 'rgba(0,0,0,0.03)';
    ctx.fillRect(x, pad.t, barW, ch);

    // Bar
    ctx.fillStyle = i === n - 1 ? '#8b6914' : 'rgba(139,105,20,0.35)';
    ctx.fillRect(x, y, barW, barH);

    // Week label (M/D)
    const parts = d.week_start.split('-');
    const label = parseInt(parts[1]) + '/' + parseInt(parts[2]);
    ctx.fillStyle = '#99968e'; ctx.font = '8px DM Mono'; ctx.textAlign = 'center';
    ctx.fillText(label, x + barW / 2, pad.t + ch + 18);

    // Value inside bar if tall enough
    if (barH > 14 && values[i] > 0) {
      const kVal = values[i] >= 1000 ? Math.round(values[i] / 1000) + 'K' : values[i];
      ctx.fillStyle = '#ffffff'; ctx.font = 'bold 7px DM Mono'; ctx.textAlign = 'center';
      ctx.fillText(kVal, x + barW / 2, y + barH - 4);
    }
  });
}

function drawStatsBWChart(canvasId, bwData) {
  const canvas = document.getElementById(canvasId);
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const data = bwData.filter(d => d.weight > 0);
  const W = canvas.offsetWidth, H = canvas.offsetHeight;
  canvas.width = W * 2; canvas.height = H * 2;
  ctx.scale(2, 2);

  if (data.length < 2) {
    ctx.fillStyle = '#99968e'; ctx.font = '11px DM Mono'; ctx.textAlign = 'center';
    ctx.fillText('Need 2+ entries to show chart', W / 2, H / 2); return;
  }

  const weights = data.map(d => d.weight);
  const mn = Math.min(...weights) - 3, mx = Math.max(...weights) + 3;
  const pad = { t: 18, b: 20, l: 42, r: 12 };
  const cw = W - pad.l - pad.r, ch = H - pad.t - pad.b;
  const n = data.length;
  const xOf = i => pad.l + (cw / (n - 1)) * i;
  const yOf = w => pad.t + ch - ((w - mn) / (mx - mn)) * ch;

  // Grid
  for (let i = 0; i <= 4; i++) {
    const gy = pad.t + (ch / 4) * i;
    const gv = Math.round(mx - (mx - mn) * i / 4);
    ctx.strokeStyle = '#e4e1d8'; ctx.lineWidth = 0.5;
    ctx.beginPath(); ctx.moveTo(pad.l, gy); ctx.lineTo(W - pad.r, gy); ctx.stroke();
    ctx.fillStyle = '#99968e'; ctx.font = '9px DM Mono'; ctx.textAlign = 'right';
    ctx.fillText(gv, pad.l - 5, gy + 3);
  }

  // Trend line (linear regression)
  const xm = (n - 1) / 2, ym = weights.reduce((a, b) => a + b, 0) / n;
  let num = 0, den = 0;
  weights.forEach((w, i) => { num += (i - xm) * (w - ym); den += (i - xm) ** 2; });
  const slope = den ? num / den : 0;
  ctx.strokeStyle = 'rgba(139,105,20,0.2)'; ctx.lineWidth = 1.5;
  ctx.setLineDash([4, 4]);
  ctx.beginPath();
  ctx.moveTo(pad.l, yOf(slope * 0 + (ym - slope * xm)));
  ctx.lineTo(W - pad.r, yOf(slope * (n - 1) + (ym - slope * xm)));
  ctx.stroke(); ctx.setLineDash([]);

  // Fill area under line
  ctx.beginPath();
  data.forEach((d, i) => { i === 0 ? ctx.moveTo(xOf(i), yOf(d.weight)) : ctx.lineTo(xOf(i), yOf(d.weight)); });
  ctx.lineTo(xOf(n - 1), pad.t + ch); ctx.lineTo(pad.l, pad.t + ch); ctx.closePath();
  ctx.fillStyle = 'rgba(139,105,20,0.08)'; ctx.fill();

  // Line
  ctx.strokeStyle = '#8b6914'; ctx.lineWidth = 2; ctx.beginPath();
  data.forEach((d, i) => { i === 0 ? ctx.moveTo(xOf(i), yOf(d.weight)) : ctx.lineTo(xOf(i), yOf(d.weight)); });
  ctx.stroke();

  // Dots (first, last, min, max)
  const special = new Set([0, n - 1, weights.indexOf(Math.min(...weights)), weights.indexOf(Math.max(...weights))]);
  data.forEach((d, i) => {
    if (!special.has(i)) return;
    ctx.beginPath(); ctx.arc(xOf(i), yOf(d.weight), 3, 0, Math.PI * 2);
    ctx.fillStyle = '#8b6914'; ctx.fill();
    ctx.fillStyle = '#8b6914'; ctx.font = 'bold 9px DM Mono';
    ctx.textAlign = i === 0 ? 'left' : i === n - 1 ? 'right' : 'center';
    ctx.fillText(d.weight, xOf(i) + (i === 0 ? 4 : i === n - 1 ? -4 : 0), yOf(d.weight) - 6);
  });
}

// ===== API SYNC =====
async function initFromAPI() {
  try {
    const today = todayKey();
    const ws    = weekStart();
    const [dataRes, bwRes] = await Promise.all([
      fetch(`/api/data?date=${today}&since=${ws}`),
      fetch('/api/bodyweight')
    ]);
    if (!dataRes.ok || !bwRes.ok) return;
    const [dataJson, bwJson] = await Promise.all([dataRes.json(), bwRes.json()]);

    const db = loadDB();
    // Merge server sessions into local store (server is authoritative)
    if (dataJson.sessions) {
      if (!db.sessions) db.sessions = {};
      Object.assign(db.sessions, dataJson.sessions);
    }
    if (Array.isArray(bwJson)) db.bodyweight = bwJson;
    saveDB(db);

    // Re-render with server data
    Object.keys(DAYS).forEach(d => renderDay(d));
    renderPrinciples();
    updateWeeklySummary();
  } catch(e) {
    console.warn('Neon sync failed — running from local cache:', e);
  }
}

let _insightCache = null;

async function loadInsight() {
  if (_insightCache) {
    const el = document.getElementById('insightBody');
    if (el) { el.classList.remove('insight-loading'); el.innerHTML = _insightCache; }
    return;
  }
  try {

    _insightCache = data.insight ? formatChatReply(data.insight) : 'No data yet — complete some sessions first.';
  } catch {
    _insightCache = 'Could not load insight.';
  }
  const el = document.getElementById('insightBody');
  if (el) { el.classList.remove('insight-loading'); el.innerHTML = _insightCache; }
}

// ===== COACH =====
let chatHistory = [];

async function renderCoach() {
  const page = document.getElementById('p-coach');
  if (page.querySelector('.chat-messages')) return; // already built
  page.innerHTML = `
    <div class="chat-messages" id="chatMessages">
      <div class="chat-empty">
        <div class="chat-empty-icon">🏋️</div>
        <div class="chat-empty-title">Iron Coach</div>
        <div class="chat-empty-hint">Ask me anything about your training. I have your full workout history, PRs, and program details.</div>
        <div class="chat-suggestions">
          <button class="chat-suggestion" onclick="chatSuggest(this)">What should I target for bench today?</button>
          <button class="chat-suggestion" onclick="chatSuggest(this)">Analyze my recent progress</button>
          <button class="chat-suggestion" onclick="chatSuggest(this)">Best peptide stack for my Achilles?</button>
          <button class="chat-suggestion" onclick="chatSuggest(this)">Build me a SARM stack for lean bulk</button>
          <button class="chat-suggestion" onclick="chatSuggest(this)">Should I deload?</button>
          <button class="chat-suggestion" onclick="chatSuggest(this)">What bloodwork should I be running?</button>
        </div>
      </div>
    </div>
    <div class="chat-input-area">
      <div class="chat-input-row">
        <textarea class="chat-input" id="chatInput" placeholder="Ask your coach..." rows="1"
          onkeydown="chatKeydown(event)" oninput="chatAutoResize(this)"></textarea>
        <button class="chat-send" id="chatSend" onclick="sendChatMessage()">Send</button>
      </div>
    </div>`;

  // Load persisted history
  try {
    const res = await fetch('/api/chat-history');
    const data = await res.json();
    if (data.messages && data.messages.length) {
      const msgs = document.getElementById('chatMessages');
      msgs.querySelector('.chat-empty')?.remove();
      data.messages.forEach(m => {
        chatHistory.push({ role: m.role, content: m.content });
        if (m.role === 'user') {
          msgs.insertAdjacentHTML('beforeend',
            `<div class="chat-msg user"><div class="chat-bubble">${escapeHtml(m.content).replace(/\n/g,'<br>')}</div></div>`);
        } else {
          msgs.insertAdjacentHTML('beforeend',
            `<div class="chat-msg ai"><div class="chat-bubble">${formatChatReply(m.content)}</div></div>`);
        }
      });
      msgs.scrollTop = msgs.scrollHeight;
    }
  } catch {}
}

function chatSuggest(btn) {
  const input = document.getElementById('chatInput');
  input.value = btn.textContent;
  chatAutoResize(input);
  sendChatMessage();
}

function chatKeydown(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendChatMessage(); }
}

function chatAutoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 110) + 'px';
}

function escapeHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function formatChatReply(text) {
  return escapeHtml(text)
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/^• /gm, '• ')
    .replace(/^- /gm, '• ')
    .replace(/\n/g, '<br>');
}

async function sendChatMessage() {
  const input  = document.getElementById('chatInput');
  const sendBtn = document.getElementById('chatSend');
  const msgs   = document.getElementById('chatMessages');
  const text   = input.value.trim();
  if (!text || sendBtn.disabled) return;

  // Clear empty state on first message
  const empty = msgs.querySelector('.chat-empty');
  if (empty) empty.remove();

  // User bubble
  msgs.insertAdjacentHTML('beforeend',
    `<div class="chat-msg user"><div class="chat-bubble">${escapeHtml(text).replace(/\n/g,'<br>')}</div></div>`);
  input.value = '';
  input.style.height = 'auto';

  // Typing indicator
  const tid = 'typing-' + Date.now();
  msgs.insertAdjacentHTML('beforeend',
    `<div class="chat-msg ai chat-typing" id="${tid}"><div class="chat-bubble">Thinking…</div></div>`);
  msgs.scrollTop = msgs.scrollHeight;

  sendBtn.disabled = true;
  input.disabled   = true;
  chatHistory.push({ role: 'user', content: text });

  try {
    const res  = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: text, history: chatHistory.slice(-10) }),
    });
    const data = await res.json();
    const reply = data.reply || data.error || 'Something went wrong.';

    document.getElementById(tid)?.remove();
    msgs.insertAdjacentHTML('beforeend',
      `<div class="chat-msg ai"><div class="chat-bubble">${formatChatReply(reply)}</div></div>`);
    chatHistory.push({ role: 'assistant', content: reply });
    if (chatHistory.length > 20) chatHistory = chatHistory.slice(-20);
  } catch {
    document.getElementById(tid)?.remove();
    msgs.insertAdjacentHTML('beforeend',
      `<div class="chat-msg ai"><div class="chat-bubble" style="color:var(--red)">Connection error — try again.</div></div>`);
  }

  sendBtn.disabled = false;
  input.disabled   = false;
  input.focus();
  msgs.scrollTop = msgs.scrollHeight;
}
</script>
