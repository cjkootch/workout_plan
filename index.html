<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Iron Protocol — Cole</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#090909">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect fill='%23090909' width='100' height='100' rx='20'/><text y='68' x='50' text-anchor='middle' font-size='50' fill='%23c9a84c' font-family='sans-serif' font-weight='bold'>IP</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --black: #090909; --surface: #141414; --card: #1a1a1a; --border: #2a2a2a;
    --smoke: #777; --silver: #aaa; --white: #f2f1ed;
    --gold: #c9a84c; --gold-bg: rgba(201,168,76,0.08); --gold-dim: #7a5f28;
    --red: #b03030; --red-bg: rgba(176,48,48,0.1); --orange: #d07040;
    --green: #3a8a3a; --green-bg: rgba(58,138,58,0.15);
    --tab-h: 68px; --header-h: 110px;
  }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html, body { background:var(--black); color:var(--white); font-family:'DM Mono',monospace; height:100%; overflow:hidden; }

  /* HEADER */
  .app-header { position:fixed; top:0; left:0; right:0; height:var(--header-h); background:var(--black); border-bottom:1px solid var(--border); z-index:100; display:flex; flex-direction:column; justify-content:flex-end; padding:0 1rem 0.75rem; }
  .app-header::after { content:''; position:absolute; bottom:0; left:0; width:50%; height:1px; background:linear-gradient(90deg,var(--gold),transparent); }
  .header-top { display:flex; justify-content:space-between; align-items:center; margin-bottom:0.5rem; }
  .logo { font-family:'Bebas Neue',sans-serif; font-size:2rem; letter-spacing:0.08em; line-height:1; }
  .logo span { color:var(--gold); }
  .header-badge { font-size:0.55rem; letter-spacing:0.1em; text-transform:uppercase; color:var(--smoke); text-align:right; line-height:1.7; }
  .header-badge strong { color:var(--gold); font-weight:500; }
  .stats-strip { display:flex; gap:0.6rem; overflow-x:auto; scrollbar-width:none; }
  .stats-strip::-webkit-scrollbar { display:none; }
  .stat-pill { flex-shrink:0; display:flex; align-items:center; gap:0.35rem; background:var(--surface); border:1px solid var(--border); border-radius:20px; padding:0.2rem 0.65rem; }
  .stat-pill-label { font-size:0.48rem; letter-spacing:0.1em; text-transform:uppercase; color:var(--smoke); }
  .stat-pill-value { font-family:'Bebas Neue',sans-serif; font-size:0.8rem; color:var(--gold); letter-spacing:0.05em; }

  /* SESSION TIMER BAR */
  .session-bar { display:none; position:fixed; top:var(--header-h); left:0; right:0; height:32px; background:var(--surface); border-bottom:1px solid var(--border); z-index:99; padding:0 1rem; align-items:center; justify-content:space-between; }
  .session-bar.active { display:flex; }
  .session-timer-text { font-size:0.6rem; color:var(--gold); letter-spacing:0.06em; }
  .session-btn { font-size:0.5rem; letter-spacing:0.1em; text-transform:uppercase; background:none; border:1px solid var(--border); color:var(--smoke); border-radius:4px; padding:0.2rem 0.5rem; cursor:pointer; font-family:inherit; }
  .session-btn:hover { color:var(--gold); border-color:var(--gold-dim); }
  .session-btn.end { border-color:var(--red); color:var(--red); }

  /* REST TIMER OVERLAY */
  .rest-overlay { display:none; position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(9,9,9,0.92); z-index:200; flex-direction:column; align-items:center; justify-content:center; }
  .rest-overlay.active { display:flex; }
  .rest-label { font-size:0.6rem; letter-spacing:0.2em; text-transform:uppercase; color:var(--smoke); margin-bottom:0.5rem; }
  .rest-time { font-family:'Bebas Neue',sans-serif; font-size:6rem; color:var(--gold); line-height:1; }
  .rest-exercise { font-size:0.6rem; color:var(--silver); margin-top:1rem; text-align:center; max-width:80%; }
  .rest-skip { margin-top:2rem; font-size:0.55rem; letter-spacing:0.1em; text-transform:uppercase; background:none; border:1px solid var(--border); color:var(--smoke); border-radius:6px; padding:0.5rem 1.5rem; cursor:pointer; font-family:inherit; }
  .rest-skip:hover { color:var(--gold); border-color:var(--gold-dim); }

  /* SCROLL AREA */
  .scroll-area { position:fixed; top:var(--header-h); bottom:var(--tab-h); left:0; right:0; overflow-y:auto; -webkit-overflow-scrolling:touch; overscroll-behavior:contain; }
  .scroll-area.with-timer { top:calc(var(--header-h) + 32px); }
  .page { display:none; padding:1rem 1rem 1.5rem; }
  .page.active { display:block; }

  /* DAY HERO */
  .day-hero { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:1.25rem 1.25rem 1.25rem 1.5rem; margin-bottom:1rem; position:relative; overflow:hidden; }
  .day-hero::before { content:''; position:absolute; top:0; left:0; width:4px; height:100%; background:var(--gold); }
  .day-hero-tag { font-size:0.52rem; letter-spacing:0.18em; text-transform:uppercase; color:var(--gold); margin-bottom:0.3rem; }
  .day-hero-title { font-family:'Bebas Neue',sans-serif; font-size:2.2rem; letter-spacing:0.05em; line-height:1; margin-bottom:0.4rem; }
  .day-hero-sub { font-size:0.6rem; color:var(--smoke); letter-spacing:0.04em; line-height:1.6; }

  /* BLOCK LABEL */
  .block-label { font-size:0.52rem; letter-spacing:0.2em; text-transform:uppercase; color:var(--gold); padding:0.6rem 0 0.5rem; display:flex; align-items:center; gap:0.75rem; margin-bottom:0.5rem; }
  .block-label::after { content:''; flex:1; height:1px; background:var(--border); }

  /* EXERCISE CARD */
  .ex-card { background:var(--card); border:1px solid var(--border); border-radius:10px; margin-bottom:0.6rem; overflow:hidden; transition:border-color 0.2s; }
  .ex-card.all-done { border-color:var(--green); }
  .ex-card-top { padding:0.9rem 1rem 0.75rem; display:flex; justify-content:space-between; align-items:flex-start; gap:0.5rem; }
  .ex-left { flex:1; }
  .ex-name { font-size:0.75rem; font-weight:500; letter-spacing:0.02em; line-height:1.3; margin-bottom:0.25rem; color:var(--white); }
  .ex-note { font-size:0.58rem; color:var(--smoke); font-style:italic; line-height:1.5; }
  .ex-last-session { font-size:0.52rem; color:var(--gold-dim); margin-top:0.3rem; }
  .ex-badges { display:flex; flex-direction:column; align-items:flex-end; gap:0.25rem; flex-shrink:0; }
  .ex-badge { font-size:0.58rem; letter-spacing:0.04em; padding:0.18rem 0.45rem; border-radius:4px; white-space:nowrap; }
  .ex-badge.sets { background:var(--gold-bg); color:var(--gold); border:1px solid var(--gold-dim); }
  .ex-badge.reps { background:var(--surface); color:var(--silver); border:1px solid var(--border); }
  .ex-meta-strip { background:var(--surface); border-top:1px solid var(--border); padding:0.45rem 1rem; display:flex; gap:1.5rem; }
  .ex-meta-label { font-size:0.43rem; letter-spacing:0.15em; text-transform:uppercase; color:var(--smoke); margin-bottom:0.1rem; }
  .ex-meta-value { font-size:0.62rem; color:var(--silver); }
  .ss-badge { display:inline-block; font-size:0.43rem; letter-spacing:0.08em; background:rgba(201,168,76,0.15); color:var(--gold); padding:0.1rem 0.3rem; border-radius:3px; text-transform:uppercase; margin-left:0.35rem; vertical-align:middle; }

  /* SET LOGGING */
  .set-log-area { padding:0; max-height:0; overflow:hidden; border-top:1px solid transparent; transition:max-height 0.3s ease, padding 0.3s ease, border-color 0.2s; }
  .ex-card.expanded .set-log-area { padding:0.5rem 1rem 0.75rem; max-height:500px; border-top-color:var(--border); }
  .ex-card-top { cursor:pointer; }
  .ex-expand-hint { font-size:0.45rem; color:var(--smoke); letter-spacing:0.08em; text-transform:uppercase; margin-top:0.2rem; transition:opacity 0.2s; }
  .ex-card.expanded .ex-expand-hint { opacity:0; }
  .set-row { display:flex; align-items:center; gap:0.5rem; padding:0.35rem 0; border-bottom:1px solid rgba(42,42,42,0.5); }
  .set-row:last-child { border-bottom:none; }
  .set-num { font-size:0.5rem; letter-spacing:0.1em; text-transform:uppercase; color:var(--smoke); width:2.5rem; flex-shrink:0; }
  .set-input { background:var(--surface); border:1px solid var(--border); border-radius:4px; color:var(--white); font-family:inherit; font-size:0.65rem; padding:0.3rem 0.4rem; width:4rem; text-align:center; }
  .set-input:focus { outline:none; border-color:var(--gold-dim); }
  .set-input::placeholder { color:var(--smoke); font-size:0.55rem; }
  .set-x { font-size:0.55rem; color:var(--smoke); }
  .set-check { width:28px; height:28px; border-radius:50%; border:2px solid var(--border); background:none; cursor:pointer; display:flex; align-items:center; justify-content:center; flex-shrink:0; transition:all 0.15s; font-size:0.7rem; color:transparent; }
  .set-check.done { background:var(--green); border-color:var(--green); color:var(--white); }

  /* CARDIO CARD */
  .cardio-card { background:var(--card); border:1px solid var(--border); border-left:3px solid var(--gold); border-radius:10px; padding:1rem; margin-bottom:0.6rem; }
  .cardio-title { font-family:'Bebas Neue',sans-serif; font-size:1.05rem; letter-spacing:0.06em; color:var(--gold); margin-bottom:0.4rem; }
  .cardio-detail { font-size:0.62rem; color:var(--silver); line-height:1.7; }
  .achilles-note { margin-top:0.6rem; padding-top:0.6rem; border-top:1px solid var(--border); font-size:0.57rem; color:var(--orange); line-height:1.5; }

  /* WARNING */
  .warning-card { background:var(--red-bg); border:1px solid rgba(176,48,48,0.35); border-left:3px solid var(--red); border-radius:10px; padding:1rem; margin-bottom:1rem; font-size:0.62rem; color:#d07070; line-height:1.7; }
  .warning-card strong { color:#e09090; }

  /* PRINCIPLES */
  .principle-card { background:var(--card); border:1px solid var(--border); border-radius:10px; margin-bottom:0.6rem; overflow:hidden; }
  .principle-card-header { padding:1rem; border-bottom:1px solid transparent; display:flex; justify-content:space-between; align-items:center; cursor:pointer; user-select:none; }
  .principle-card.open .principle-card-header { border-bottom-color:var(--border); }
  .principle-card-title { font-family:'Bebas Neue',sans-serif; font-size:1.05rem; letter-spacing:0.06em; color:var(--gold); }
  .principle-chevron { font-size:0.65rem; color:var(--smoke); transition:transform 0.2s; }
  .principle-card.open .principle-chevron { transform:rotate(180deg); }
  .principle-body { display:none; padding:1rem; }
  .principle-card.open .principle-body { display:block; }
  .principle-body p { font-size:0.63rem; color:var(--silver); line-height:1.8; margin-bottom:0.75rem; }
  .principle-list { list-style:none; }
  .principle-list li { font-size:0.61rem; color:var(--silver); padding:0.4rem 0; border-bottom:1px solid var(--border); display:flex; gap:0.5rem; line-height:1.5; }
  .principle-list li:last-child { border-bottom:none; }
  .principle-list li::before { content:'—'; color:var(--gold); flex-shrink:0; }

  /* DATA TABLE */
  .data-table { width:100%; background:var(--card); border:1px solid var(--border); border-radius:10px; overflow:hidden; margin-bottom:1rem; font-size:0.6rem; border-collapse:collapse; }
  .data-table thead { background:var(--surface); }
  .data-table th { padding:0.6rem 0.75rem; text-align:left; font-size:0.48rem; letter-spacing:0.12em; text-transform:uppercase; color:var(--smoke); font-weight:400; }
  .data-table td { padding:0.65rem 0.75rem; border-top:1px solid var(--border); color:var(--silver); line-height:1.5; }
  .data-table td:first-child { color:var(--white); }
  .gold { color:var(--gold); font-weight:500; }

  /* BODYWEIGHT LOG */
  .bw-log-section { margin-bottom:1rem; }
  .bw-input-row { display:flex; gap:0.5rem; margin-bottom:0.75rem; }
  .bw-input { flex:1; background:var(--surface); border:1px solid var(--border); border-radius:6px; color:var(--white); font-family:inherit; font-size:0.7rem; padding:0.5rem 0.75rem; }
  .bw-input:focus { outline:none; border-color:var(--gold-dim); }
  .bw-btn { background:var(--gold-bg); border:1px solid var(--gold-dim); color:var(--gold); font-family:inherit; font-size:0.55rem; letter-spacing:0.1em; text-transform:uppercase; border-radius:6px; padding:0.5rem 1rem; cursor:pointer; }
  .bw-chart { width:100%; height:120px; background:var(--surface); border:1px solid var(--border); border-radius:8px; overflow:hidden; position:relative; }
  .bw-chart canvas { width:100%; height:100%; }
  .bw-entries { margin-top:0.5rem; max-height:120px; overflow-y:auto; }
  .bw-entry { display:flex; justify-content:space-between; padding:0.3rem 0; border-bottom:1px solid rgba(42,42,42,0.5); font-size:0.55rem; }
  .bw-entry-date { color:var(--smoke); }
  .bw-entry-weight { color:var(--gold); }

  /* WEEKLY SUMMARY */
  .weekly-summary { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:1rem; margin-bottom:1rem; }
  .weekly-summary-title { font-family:'Bebas Neue',sans-serif; font-size:1.1rem; letter-spacing:0.06em; color:var(--gold); margin-bottom:0.5rem; }
  .weekly-stats { display:flex; gap:1rem; flex-wrap:wrap; }
  .weekly-stat { flex:1; min-width:60px; text-align:center; }
  .weekly-stat-value { font-family:'Bebas Neue',sans-serif; font-size:1.3rem; color:var(--gold); }
  .weekly-stat-label { font-size:0.45rem; letter-spacing:0.12em; text-transform:uppercase; color:var(--smoke); }

  /* TAB BAR */
  .tab-bar { position:fixed; bottom:0; left:0; right:0; height:var(--tab-h); background:var(--surface); border-top:1px solid var(--border); display:flex; z-index:100; padding-bottom:env(safe-area-inset-bottom); }
  .tab { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:0.2rem; background:none; border:none; cursor:pointer; padding:0.5rem 0.2rem; position:relative; }
  .tab::after { content:''; position:absolute; top:0; left:20%; right:20%; height:2px; background:var(--gold); border-radius:0 0 2px 2px; opacity:0; transition:opacity 0.15s; }
  .tab.active::after { opacity:1; }
  .tab-num { font-family:'Bebas Neue',sans-serif; font-size:1.1rem; line-height:1; color:var(--smoke); transition:color 0.15s; }
  .tab.active .tab-num { color:var(--gold); }
  .tab-label { font-size:0.4rem; letter-spacing:0.1em; text-transform:uppercase; color:var(--smoke); transition:color 0.15s; line-height:1; }
  .tab.active .tab-label { color:var(--gold); }
  .tab-icon { font-size:0.52rem; letter-spacing:0.06em; text-transform:uppercase; color:var(--smoke); transition:color 0.15s; }
  .tab.active .tab-icon { color:var(--gold); }
</style>
</head>
<body>

<header class="app-header">
  <div class="header-top">
    <div class="logo">IRON<span>PROTOCOL</span></div>
    <div class="header-badge">
      <div>235 lbs · TRT <strong>100–150mg</strong></div>
      <div>5-Day PPL/Hybrid · 12 Weeks</div>
    </div>
  </div>
  <div class="stats-strip">
    <div class="stat-pill"><span class="stat-pill-label">Protein</span><span class="stat-pill-value">235G+</span></div>
    <div class="stat-pill"><span class="stat-pill-label">Calories</span><span class="stat-pill-value">3,400+</span></div>
    <div class="stat-pill"><span class="stat-pill-label">Days/wk</span><span class="stat-pill-value">5</span></div>
    <div class="stat-pill"><span class="stat-pill-label">Goal</span><span class="stat-pill-value">MASS</span></div>
    <div class="stat-pill"><span class="stat-pill-label">Achilles</span><span class="stat-pill-value">MANAGED</span></div>
  </div>
</header>

<div class="session-bar" id="sessionBar">
  <span class="session-timer-text" id="sessionTimerText">SESSION 00:00</span>
  <div>
    <button class="session-btn" onclick="toggleSession()" id="sessionToggle">Start</button>
    <button class="session-btn end" onclick="endSession()" style="margin-left:0.3rem">End & Save</button>
  </div>
</div>

<div class="rest-overlay" id="restOverlay">
  <div class="rest-label">REST</div>
  <div class="rest-time" id="restTime">0:00</div>
  <div class="rest-exercise" id="restExName"></div>
  <button class="rest-skip" onclick="skipRest()">Skip</button>
</div>

<div class="scroll-area" id="scrollArea">

<!-- WEEKLY SUMMARY (shown on all day pages) -->
<div id="weeklySummary" style="display:none; padding:1rem 1rem 0;">
  <div class="weekly-summary">
    <div class="weekly-summary-title">This Week</div>
    <div class="weekly-stats">
      <div class="weekly-stat"><div class="weekly-stat-value" id="wkSets">0</div><div class="weekly-stat-label">Sets</div></div>
      <div class="weekly-stat"><div class="weekly-stat-value" id="wkReps">0</div><div class="weekly-stat-label">Reps</div></div>
      <div class="weekly-stat"><div class="weekly-stat-value" id="wkTonnage">0</div><div class="weekly-stat-label">Tonnage (lbs)</div></div>
      <div class="weekly-stat"><div class="weekly-stat-value" id="wkSessions">0</div><div class="weekly-stat-label">Sessions</div></div>
    </div>
  </div>
</div>

<!-- DAY 1: PUSH -->
<div id="p-d1" class="page active"></div>
<!-- DAY 2: PULL -->
<div id="p-d2" class="page"></div>
<!-- DAY 3: LEGS -->
<div id="p-d3" class="page"></div>
<!-- DAY 4: UPPER -->
<div id="p-d4" class="page"></div>
<!-- DAY 5: ATHLETIC -->
<div id="p-d5" class="page"></div>
<!-- PRINCIPLES -->
<div id="p-ref" class="page"></div>

</div>

<nav class="tab-bar">
  <button class="tab active" onclick="showPage('d1',this)"><div class="tab-num">1</div><div class="tab-label">Push</div></button>
  <button class="tab" onclick="showPage('d2',this)"><div class="tab-num">2</div><div class="tab-label">Pull</div></button>
  <button class="tab" onclick="showPage('d3',this)"><div class="tab-num">3</div><div class="tab-label">Legs</div></button>
  <button class="tab" onclick="showPage('d4',this)"><div class="tab-num">4</div><div class="tab-label">Upper</div></button>
  <button class="tab" onclick="showPage('d5',this)"><div class="tab-num">5</div><div class="tab-label">Athletic</div></button>
  <button class="tab" onclick="showPage('ref',this)"><div class="tab-icon">REF</div><div class="tab-label">Principles</div></button>
</nav>

<script>
// ===== DATA =====
const DAYS = {
  d1: {
    tag: 'Day 01 · Monday', title: 'PUSH DAY',
    sub: 'Chest · Shoulders · Triceps<br>Volume-first. Chest heavy, shoulders secondary, tris finished.',
    blocks: [
      { label: 'A — Warmup', type: 'cardio', items: [
        { title: 'Bike — 10 Min Easy', detail: 'Low resistance. HR under 130. Joint lubrication only — not conditioning work.', achilles: 'Achilles-safe. Zero impact. Default warmup for all sessions.' }
      ]},
      { label: 'B — Primary Chest', items: [
        { name: 'Barbell Flat Bench Press', note: 'Control eccentric 3s. Drive through full chest. Main strength movement.', sets: 4, reps: '5–6', rest: '3 min', rpe: '8–9', tempo: '3-1-X', restSec: 180 },
        { name: 'Incline DB Press', note: '45° angle. Full stretch at bottom. Don\'t lock out.', sets: 4, reps: '8–10', rest: '2 min', rpe: '8', restSec: 120 },
        { name: 'Cable Fly (Low to High)', note: 'Inner chest focus. Squeeze hard at top. Full arm arc.', sets: 3, reps: '12–15', rest: '90s', rpe: '7–8', restSec: 90 }
      ]},
      { label: 'C — Shoulders', items: [
        { name: 'Seated DB Overhead Press', note: 'Controlled descent. Don\'t shrug at top.', sets: 4, reps: '8–10', rest: '2 min', rpe: '8', restSec: 120 },
        { name: 'Lateral Raise (Cable or DB)', note: 'Slight lean, lead with elbow. Do not shrug.', sets: 4, reps: '15–20', rest: '60s', rpe: '7', restSec: 60 }
      ]},
      { label: 'D — Triceps Finisher', items: [
        { name: 'Overhead Cable Tricep Extension', note: 'Long head stretch. Full extension. Go straight into pushdown.', sets: 3, reps: '12', rest: 'No rest', rpe: '8', ss: 'SS A', restSec: 0 },
        { name: 'Tricep Rope Pushdown', note: 'Flare rope at bottom. Superset with extension above.', sets: 3, reps: '15', rest: '90s', rpe: '7–8', ss: 'SS A', restSec: 90 }
      ]}
    ]
  },
  d2: {
    tag: 'Day 02 · Tuesday', title: 'PULL DAY',
    sub: 'Back Thickness · Lats · Biceps<br>Heaviest back day. Row patterns dominate.',
    blocks: [
      { label: 'A — Warmup', type: 'cardio', items: [
        { title: 'Row Machine — 8 Min', detail: 'Moderate pace, 24–26 strokes/min. Activates the exact muscles you\'re about to train.', achilles: 'Upper body dominant. Zero lower extremity impact.' }
      ]},
      { label: 'B — Back Thickness', items: [

// ===== STORAGE =====
const DB_KEY = 'ironprotocol_v2';
// memDB is the live in-memory store; localStorage is the offline cache.
let memDB = null;
function loadDB() {
  if (memDB !== null) return memDB;
  try { memDB = JSON.parse(localStorage.getItem(DB_KEY)) || {}; }
  catch(e) { memDB = {}; }
  return memDB;
}
function saveDB(db) {
  memDB = db;
  try { localStorage.setItem(DB_KEY, JSON.stringify(db)); } catch(e) {}
}
function todayKey() { return new Date().toISOString().slice(0,10); }
function weekStart() { const d = new Date(); d.setDate(d.getDate() - d.getDay()); return d.toISOString().slice(0,10); }

function getSessionData(day, exName) {
  const db = loadDB();
  const key = todayKey();
  return (db.sessions && db.sessions[key] && db.sessions[key][day] && db.sessions[key][day][exName]) || null;
}
function saveSetData(day, exName, setIdx, weight, reps, done) {
  const db = loadDB();
  const key = todayKey();
  if (!db.sessions) db.sessions = {};
  if (!db.sessions[key]) db.sessions[key] = {};
  if (!db.sessions[key][day]) db.sessions[key][day] = {};
  if (!db.sessions[key][day][exName]) db.sessions[key][day][exName] = [];
  db.sessions[key][day][exName][setIdx] = { weight, reps, done };
  saveDB(db);
  // Persist to Neon in background
  fetch('/api/sets', {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ date: key, day, exercise: exName, setIdx, weight, reps, done })
  }).catch(() => {});
}

function getLastSession(day, exName) {
  const db = loadDB();
  if (!db.sessions) return null;
  const today = todayKey();
  const dates = Object.keys(db.sessions).filter(d => d < today && db.sessions[d][day] && db.sessions[d][day][exName]).sort().reverse();
  return dates.length ? { date: dates[0], sets: db.sessions[dates[0]][day][exName] } : null;
}

function getWeeklyStats() {
  const db = loadDB();
  if (!db.sessions) return { sets: 0, reps: 0, tonnage: 0, sessions: 0 };
  const ws = weekStart();
  let sets = 0, reps = 0, tonnage = 0, sessionDays = new Set();
  Object.entries(db.sessions).forEach(([date, days]) => {
    if (date >= ws) {
      Object.entries(days).forEach(([day, exercises]) => {
        let hasWork = false;
        Object.values(exercises).forEach(setArr => {
          setArr.forEach(s => {
            if (s && s.done) {
              sets++;
              const r = parseInt(s.reps) || 0;
              const w = parseFloat(s.weight) || 0;
              reps += r;
              tonnage += r * w;
              hasWork = true;
            }
          });
        });
        if (hasWork) sessionDays.add(date);
      });
    }
  });
  return { sets, reps, tonnage: Math.round(tonnage), sessions: sessionDays.size };
}

// ===== BODYWEIGHT =====
function saveBW(weight) {
  const db = loadDB();
  if (!db.bodyweight) db.bodyweight = [];
  const entry = { date: todayKey(), weight: parseFloat(weight) };
  db.bodyweight.push(entry);
  saveDB(db);
  // Persist to Neon in background
  fetch('/api/bodyweight', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ weight: entry.weight, date: entry.date })
  }).catch(() => {});
}
function getBWData() { const db = loadDB(); return (db.bodyweight || []).slice(-30); }

// ===== SESSION TIMER =====
let sessionStart = null, sessionInterval = null, sessionActive = false;
function toggleSession() {
  if (!sessionActive) {
    sessionActive = true; sessionStart = Date.now();
    document.getElementById('sessionBar').classList.add('active');
    document.getElementById('scrollArea').classList.add('with-timer');
    document.getElementById('sessionToggle').textContent = 'Pause';
    sessionInterval = setInterval(updateSessionTimer, 1000);
  } else {
    sessionActive = false;
    document.getElementById('sessionToggle').textContent = 'Resume';
    clearInterval(sessionInterval);
  }
}
function endSession() {
  const elapsed = sessionStart ? Math.floor((Date.now() - sessionStart)/1000) : 0;
  sessionActive = false; sessionStart = null;
  clearInterval(sessionInterval);
  document.getElementById('sessionBar').classList.remove('active');
  document.getElementById('scrollArea').classList.remove('with-timer');
  document.getElementById('sessionTimerText').textContent = 'SESSION 00:00';
  document.getElementById('sessionToggle').textContent = 'Start';
  // Save session duration locally + persist to Neon
  const db = loadDB();
  if (!db.sessionTimes) db.sessionTimes = [];
  const sessionDate = todayKey();
  db.sessionTimes.push({ date: sessionDate, duration: elapsed });
  saveDB(db);
  fetch('/api/sessions', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ duration: elapsed, date: sessionDate })
  }).catch(() => {});
  updateWeeklySummary();
}
function updateSessionTimer() {
  if (!sessionStart) return;
  const s = Math.floor((Date.now() - sessionStart)/1000);
  const m = Math.floor(s/60), sec = s%60;
  document.getElementById('sessionTimerText').textContent = `SESSION ${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
}

// ===== REST TIMER =====
let restInterval = null, restRemaining = 0;
function startRest(seconds, exName) {
  if (seconds <= 0) return;
  restRemaining = seconds;
  document.getElementById('restExName').textContent = 'Next: ' + exName;
  document.getElementById('restOverlay').classList.add('active');
  updateRestDisplay();
  restInterval = setInterval(() => {
    restRemaining--;
    if (restRemaining <= 0) { skipRest(); return; }
    updateRestDisplay();
  }, 1000);
}
function updateRestDisplay() {
  const m = Math.floor(restRemaining/60), s = restRemaining%60;
  document.getElementById('restTime').textContent = m > 0 ? `${m}:${String(s).padStart(2,'0')}` : `0:${String(s).padStart(2,'0')}`;
}
function skipRest() {
  clearInterval(restInterval);
  document.getElementById('restOverlay').classList.remove('active');
  // vibrate if available
  if (navigator.vibrate) navigator.vibrate(200);
}

function renderDay(dayId) {
  const day = DAYS[dayId];
  const page = document.getElementById('p-' + dayId);
  let html = `<div class="day-hero"><div class="day-hero-tag">${day.tag}</div><div class="day-hero-title">${day.title}</div><div class="day-hero-sub">${day.sub}</div></div>`;
  if (day.warning) html += `<div class="warning-card">${day.warning}</div>`;

  day.blocks.forEach(block => {
    html += `<div class="block-label">${block.label}</div>`;
    if (block.type === 'cardio') {
      block.items.forEach(c => {
        html += `<div class="cardio-card"><div class="cardio-title">${c.title}</div><div class="cardio-detail">${c.detail}</div>`;
        if (c.achilles) html += `<div class="achilles-note">⚡ ${c.achilles}</div>`;
        html += `</div>`;
      });
    } else {
      block.items.forEach(ex => {
        const last = getLastSession(dayId, ex.name);
        const today = getSessionData(dayId, ex.name);
        const allDone = today && today.length >= ex.sets && today.every(s => s && s.done);

        const hasData = today && today.some(s => s && (s.weight || s.reps || s.done));
        html += `<div class="ex-card${allDone ? ' all-done' : ''}${hasData ? ' expanded' : ''}">`;
        html += `<div class="ex-card-top" onclick="toggleCard(this)"><div class="ex-left">`;
        html += `<div class="ex-name">${ex.name}${ex.ss ? `<span class="ss-badge">${ex.ss}</span>` : ''}</div>`;
        html += `<div class="ex-note">${ex.note}</div>`;
        if (last) {
          const lastSets = last.sets.filter(s => s && s.done);
          if (lastSets.length) {
            const weights = lastSets.map(s => s.weight).filter(Boolean);
            const maxW = weights.length ? Math.max(...weights) : null;
            html += `<div class="ex-last-session">Last (${last.date}): ${maxW ? maxW + ' lbs' : ''} × ${lastSets.length} sets</div>`;
          }
        }
        html += `<div class="ex-expand-hint">tap to log</div>`;
        html += `</div><div class="ex-badges"><div class="ex-badge sets">${ex.sets} sets</div><div class="ex-badge reps">${ex.reps} reps</div></div></div>`;

        html += `<div class="ex-meta-strip">`;
        html += `<div><div class="ex-meta-label">Rest</div><div class="ex-meta-value">${ex.rest}</div></div>`;
        html += `<div><div class="ex-meta-label">RPE</div><div class="ex-meta-value">${ex.rpe}</div></div>`;
        if (ex.tempo) html += `<div><div class="ex-meta-label">Tempo</div><div class="ex-meta-value">${ex.tempo}</div></div>`;
        html += `</div>`;

        // Set logging
        html += `<div class="set-log-area">`;
        for (let i = 0; i < ex.sets; i++) {
          const sd = today && today[i] ? today[i] : { weight: '', reps: '', done: false };
          const lastWeight = last && last.sets[i] && last.sets[i].weight ? last.sets[i].weight : '';
          html += `<div class="set-row">`;
          html += `<span class="set-num">Set ${i+1}</span>`;
          html += `<input class="set-input" type="number" inputmode="decimal" placeholder="${lastWeight || 'lbs'}" value="${sd.weight || ''}" onchange="logSet('${dayId}','${ex.name.replace(/'/g,"\\'")}',${i},this)" data-field="weight">`;
          html += `<span class="set-x">×</span>`;
          html += `<input class="set-input" type="number" inputmode="numeric" placeholder="${ex.reps}" value="${sd.reps || ''}" onchange="logSet('${dayId}','${ex.name.replace(/'/g,"\\'")}',${i},this)" data-field="reps">`;
          html += `<button class="set-check ${sd.done ? 'done' : ''}" onclick="completeSet('${dayId}','${ex.name.replace(/'/g,"\\'")}',${i},this,${ex.restSec})">✓</button>`;
          html += `</div>`;
        }
        html += `</div>`;
        html += `</div>`;
      });
    }
  });
  page.innerHTML = html;
}

function toggleCard(topEl) {
  const card = topEl.closest('.ex-card');
  card.classList.toggle('expanded');
}

function logSet(day, exName, idx, input) {
  const row = input.closest('.set-row');
  const wInput = row.querySelector('[data-field="weight"]');
  const rInput = row.querySelector('[data-field="reps"]');
  const existing = getSessionData(day, exName);
  const done = existing && existing[idx] ? existing[idx].done : false;
  saveSetData(day, exName, idx, wInput.value, rInput.value, done);
}

function completeSet(day, exName, idx, btn, restSec) {
  const row = btn.closest('.set-row');
  const wInput = row.querySelector('[data-field="weight"]');
  const rInput = row.querySelector('[data-field="reps"]');
  const wasDone = btn.classList.contains('done');
  const nowDone = !wasDone;
  btn.classList.toggle('done');
  saveSetData(day, exName, idx, wInput.value, rInput.value, nowDone);

  // Auto-start session on first set completion
  if (nowDone && !sessionStart) { toggleSession(); }

  // Check if card is all done
  const card = btn.closest('.ex-card');
  const allChecks = card.querySelectorAll('.set-check');
  const allDone = Array.from(allChecks).every(c => c.classList.contains('done'));
  card.classList.toggle('all-done', allDone);

  // Start rest timer
  if (nowDone && restSec > 0) { startRest(restSec, exName); }

  updateWeeklySummary();
}

  [['Flat Bench','+15–20 lbs','+30–40 lbs'],['Barbell Row','+15 lbs','+30 lbs'],['Back Squat','+20 lbs','+35–45 lbs'],['Romanian DL','+15 lbs','+30 lbs'],['DB OHP','+5–10 lbs','+10–20 lbs'],['Bodyweight','235–238 lbs','238–242 lbs']].forEach(r => {
    html += `<tr><td>${r[0]}</td><td>${r[1]}</td><td class="gold">${r[2]}</td></tr>`;
  });
  html += `</tbody></table>`;
  page.innerHTML = html;
  renderBWChart();
  renderBWEntries();
}

function logBodyweight() {
  const input = document.getElementById('bwInput');
  const val = parseFloat(input.value);
  if (!val || val < 50 || val > 500) return;
  saveBW(val);
  input.value = '';
  renderBWChart();
  renderBWEntries();
}

function renderBWChart() {
  const canvas = document.getElementById('bwChart');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const data = getBWData();
  const w = canvas.offsetWidth, h = canvas.offsetHeight;
  canvas.width = w * 2; canvas.height = h * 2;
  ctx.scale(2, 2);
  ctx.clearRect(0, 0, w, h);
  if (data.length < 2) {
    ctx.fillStyle = '#777'; ctx.font = '11px DM Mono'; ctx.textAlign = 'center';
    ctx.fillText(data.length === 0 ? 'Log your weight to see trends' : 'Need 2+ entries for chart', w/2, h/2);
    return;
  }
  const weights = data.map(d => d.weight);
  const min = Math.min(...weights) - 2, max = Math.max(...weights) + 2;
  const pad = { t: 15, b: 20, l: 40, r: 10 };
  const cw = w - pad.l - pad.r, ch = h - pad.t - pad.b;

  // Grid
  ctx.strokeStyle = '#2a2a2a'; ctx.lineWidth = 0.5;
  for (let i = 0; i <= 4; i++) {
    const y = pad.t + (ch / 4) * i;
    ctx.beginPath(); ctx.moveTo(pad.l, y); ctx.lineTo(w - pad.r, y); ctx.stroke();
    ctx.fillStyle = '#777'; ctx.font = '9px DM Mono'; ctx.textAlign = 'right';
    ctx.fillText(Math.round(max - (max - min) * i / 4), pad.l - 5, y + 3);
  }

  // Line
  ctx.strokeStyle = '#c9a84c'; ctx.lineWidth = 2; ctx.beginPath();
  data.forEach((d, i) => {
    const x = pad.l + (cw / (data.length - 1)) * i;
    const y = pad.t + ch - ((d.weight - min) / (max - min)) * ch;
    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  });
  ctx.stroke();

  // Dots
  data.forEach((d, i) => {
    const x = pad.l + (cw / (data.length - 1)) * i;
    const y = pad.t + ch - ((d.weight - min) / (max - min)) * ch;
    ctx.beginPath(); ctx.arc(x, y, 3, 0, Math.PI * 2);
    ctx.fillStyle = '#c9a84c'; ctx.fill();
  });
}

function renderBWEntries() {
  const el = document.getElementById('bwEntries');
  if (!el) return;
  const data = getBWData().reverse().slice(0, 10);
  el.innerHTML = data.map(d => `<div class="bw-entry"><span class="bw-entry-date">${d.date}</span><span class="bw-entry-weight">${d.weight} lbs</span></div>`).join('');
}

function updateWeeklySummary() {
  const stats = getWeeklyStats();
  document.getElementById('wkSets').textContent = stats.sets;
  document.getElementById('wkReps').textContent = stats.reps.toLocaleString();
  document.getElementById('wkTonnage').textContent = stats.tonnage.toLocaleString();
  document.getElementById('wkSessions').textContent = stats.sessions;
}

let currentPage = 'd1';
function showPage(id, btn) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('p-' + id).classList.add('active');
  btn.classList.add('active');
  document.querySelector('.scroll-area').scrollTop = 0;
  currentPage = id;

  document.getElementById('weeklySummary').style.display = id !== 'ref' ? 'block' : 'none';
}
function toggleP(header) { header.parentElement.classList.toggle('open'); }

// ===== API SYNC =====
async function initFromAPI() {
  try {
    const today = todayKey();
    const ws    = weekStart();
    const [dataRes, bwRes] = await Promise.all([
      fetch(`/api/data?date=${today}&since=${ws}`),
      fetch('/api/bodyweight')
    ]);
    if (!dataRes.ok || !bwRes.ok) return;
    const [dataJson, bwJson] = await Promise.all([dataRes.json(), bwRes.json()]);

    const db = loadDB();
    // Merge server sessions into local store (server is authoritative)
    if (dataJson.sessions) {
      if (!db.sessions) db.sessions = {};
      Object.assign(db.sessions, dataJson.sessions);
    }
    if (Array.isArray(bwJson)) db.bodyweight = bwJson;
    saveDB(db);

    // Re-render with server data
    Object.keys(DAYS).forEach(d => renderDay(d));
    renderPrinciples();
    updateWeeklySummary();
  } catch(e) {
    console.warn('Neon sync failed — running from local cache:', e);
  }
}
